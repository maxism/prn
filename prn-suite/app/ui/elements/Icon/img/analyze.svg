<svg viewBox="0 0 40 40" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <g transform="rotate(180, 20, 20)">
        <rect class="analyze-bar" x="5" y="5" rx="2"></rect>
        <rect class="analyze-bar" x="17" y="5" rx="2"></rect>
        <rect class="analyze-bar" x="29" y="5" rx="2"></rect>
    </g>
    <style>
        .analyze-bar{
        width: 7px;
        fill: #fff;
        }
        .analyze-bar:first-child{
        height: 60%;
        animation: 1.2s linear 0s infinite animate1;
        }
        .analyze-bar:nth-child(2){
        height: 75%;
        animation: 1s linear 0s infinite animate2;
        }
        .analyze-bar:last-child{
        height: 45%;
        animation: 0.8s linear 0s infinite animate3;
        }

        @keyframes animate1{
            0%{
            height: 40%;
            }
            20%{
            height: 57.7%;
            }
            40%{
            height: 92%;
            }
            80%{
            height: 77%;
            }
            100%{
            height: 10%;
            }
        }
        @keyframes animate2{
            0%{
            height: 67%;
            }
            20%{
            height: 95.5%;
            }
            40%{
            height: 57%;
            }
            80%{
            height: 33%;
            }
            100%{
            height: 40%;
            }
        }

        @keyframes animate3{
            0%{
            height: 57.5%;
            }
            20%{
            height: 100%;
            }
            40%{
            height: 77%;
            }
            80%{
            height: 30%;
            }
            100%{
            height: 45%;
            }
        }
    </style>
</svg>
