server {
    listen 80;
    server_name c-cube.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name suite.c-cube.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name c-cube.ru;

    ssl_certificate     /etc/letsencrypt/live/c-cube.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/c-cube.ru/privkey.pem;
    include /etc/nginx/tls/options-ssl-nginx.conf;
    ssl_dhparam /etc/nginx/tls/ssl-dhparams.pem;

    client_max_body_size 50m;

    location / {
        proxy_pass http://nweb:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name suite.c-cube.ru;

    ssl_certificate     /etc/letsencrypt/live/suite.c-cube.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suite.c-cube.ru/privkey.pem;
    include /etc/nginx/tls/options-ssl-nginx.conf;
    ssl_dhparam /etc/nginx/tls/ssl-dhparams.pem;

    location / {
        proxy_pass http://ui:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
